<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram AIO Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header id="header-title">File Manager</header>

    <main>
        <section id="tab-files" class="tab-content active">
            <div class="navigation-bar">
                <button class="neu-btn back-btn" id="back-btn" onclick="navigateUp()" aria-label="Go back">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="breadcrumbs neu-in" id="breadcrumbs"></div>
            </div>

            <div class="toolbar">
                <button class="neu-btn text-accent" onclick="triggerUpload()">
                    <i class="fas fa-cloud-arrow-up"></i> Upload
                </button>
                <button class="neu-btn" onclick="showDownloadDialog()">
                    <i class="fas fa-magnet"></i> Add
                </button>
                <button class="neu-btn" onclick="zipFiles()">
                    <i class="fas fa-file-zipper"></i> Zip
                </button>
                <button class="neu-btn text-danger" onclick="deleteFiles()">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>

            <input type="file" id="file-upload" multiple hidden onchange="handleFileUpload(event)">

            <div class="file-list" id="file-list"></div>
        </section>

        <section id="tab-downloads" class="tab-content">
            <button class="neu-btn wide-action text-accent" onclick="showDownloadDialog()">
                <i class="fas fa-plus"></i> New URL or Magnet
            </button>
            <div id="download-list"></div>
        </section>

        <section id="tab-info" class="tab-content">
            <div class="info-grid">
                <div class="info-card neu-out">
                    <i class="fas fa-tachometer-alt"></i>
                    <h3 id="dl-speed">0 B/s</h3>
                    <p>Current down speed</p>
                </div>
                <div class="info-card neu-out">
                    <i class="fas fa-folder-open"></i>
                    <h3 id="total-count">0</h3>
                    <p>Total items</p>
                </div>
            </div>

            <div class="disk-usage neu-out">
                <h3>Storage Usage</h3>
                <div class="circle-wrap">
                    <div class="circle-inner">
                        <h2 id="storage-percentage">0%</h2>
                        <span id="storage-ratio">0 B</span>
                    </div>
                </div>
                <p id="storage-summary">Calculated from the download folder.</p>
            </div>
        </section>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('files', this)" data-title="File Manager">
            <i class="fas fa-folder"></i>
        </div>
        <div class="nav-item" onclick="switchTab('downloads', this)" data-title="Active Downloads">
            <i class="fas fa-cloud-arrow-down"></i>
        </div>
        <div class="nav-item" onclick="switchTab('info', this)" data-title="System Monitor">
            <i class="fas fa-chart-pie"></i>
        </div>
    </nav>

    <div id="download-modal" class="modal hidden">
        <div class="modal-sheet neu-out">
            <div class="modal-header">
                <h3><i class="fas fa-magnet"></i> Add Download</h3>
                <button class="neu-btn icon-btn" onclick="closeDownloadDialog()" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <textarea id="download-source" class="neu-in" rows="6" placeholder="Paste URLs or magnet links, one per line"></textarea>
            <button class="neu-btn modal-submit text-accent" onclick="startDownloads()">
                <i class="fas fa-cloud-arrow-down"></i> Start Download
            </button>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
